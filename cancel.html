<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout canceled</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="checkout-page">
  <main class="checkout-wrap">
    <section class="checkout-card">
      <img src="oppster-logo.png" alt="Oppster Logo" class="oppster-logo">

      <div class="plan-label">Checkout canceled</div>

      <h1>No problem.</h1>

      <p class="checkout-subtext">
        Your checkout was canceled and no payment was processed.
        You can return anytime to continue exploring Oppster.
      </p>

      <a class="button secondary" href="index.html#pricing">
        Return to Pricing
      </a>

      <p class="secure-note">
        Questions before getting started? Book an intro call from the homepage.
      </p>
    </section>
  </main>
</body>
</html>
